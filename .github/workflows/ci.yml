name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: order-service
            module: order-service/order-domain/order-application-service
          # Add new services here, e.g.:
          # - service: customer-service
          #   module: customer-service/customer-domain/customer-application-service
          # - service: restaurant-service
          #   module: restaurant-service/restaurant-domain/restaurant-application-service

    name: Test / ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        run: |
          mvn test \
            -pl ${{ matrix.module }} \
            -am \
            --batch-mode \
            --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.service }}
          path: ${{ matrix.module }}/target/surefire-reports/
          retention-days: 7
